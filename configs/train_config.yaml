experiment_name: "heart_disease_baseline"

data:
  dvc_path: "data/raw/heart.csv"
  target: "target"
  test_size: 0.2
  random_state: 42

model:
  type: "RandomForestClassifier"
  n_estimators: 300
  max_depth: 8
  min_samples_split: 2
  min_samples_leaf: 1
  n_jobs: -1

training:
  primary_metric: "f1"
  metrics:
    - "accuracy"
    - "precision"
    - "recall"
    - "f1"
  min_f1: 0.78

